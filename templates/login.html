<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
          crossorigin="anonymous">
    <title>Sign In</title>
</head>
<body>
    <!-- Navigation bar -->
    <div>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">Nittany Auction</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0 mr-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="/">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">About</a>
                        </li>
                    </ul>
                    <div class="form-inline my-2 my-lg-0">
                        <a href="/login" class="btn btn-primary mr-2">Login</a>
                        <a href="/signup" class="btn btn-outline-secondary">Sign Up</a>
                    </div>
                </div>
            </div>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="container mt-5 pb-5 text-center d-flex align-items-center" style="max-width: 70%; min-height: 80vh;">
        <div class="row align-items-start w-100">
            <div class="col-md-6 text-center d-none d-md-block">
                <img src="{{ url_for('static', filename='images/login.svg') }}"
                     class="img-fluid" alt="Sign-in illustration" style="max-width: 110%;">
            </div>
            <div class="col-md-6 text-md-left text-center">
                <h1 class="display-4 mb-4">Sign In</h1>
                <form>
                    <div class="mb-4">
                        <input type="email" id="login-email" class="form-control form-control-lg"
                               placeholder="Email address">
                    </div>
                    <div class="mb-4">
                        <input type="password" id="login-password" class="form-control form-control-lg"
                               placeholder="Password">
                    </div>
                    <div class="text-md-right text-center mb-4">
                        <a href="#!">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg btn-block">Login</button>
                    <p class="mt-3 mb-0">Not a user? <a href="/signup">Register now</a></p>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
