<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">

    <title>Sign In</title>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Nittany Auction</a>

        <div class="ml-auto">
            <a href="/login" class="btn btn-primary mr-2">Login</a>
            <a href="/signup" class="btn btn-outline-secondary">Sign Up</a>
        </div>
    </div>
</nav>

<!-- MAIN -->
<div class="container mt-5 pb-5 d-flex align-items-center"
     style="max-width: 70%; min-height: 80vh;">

    <div class="row w-100">

        <!-- IMAGE -->
        <div class="col-md-6 d-none d-md-block">
            <img src="{{ url_for('static', filename='images/login.svg') }}"
                 class="img-fluid" alt="Sign-in illustration">
        </div>

        <!-- FORM -->
        <div class="col-md-6 text-md-left text-center">

            <h1 class="display-4 mb-4">Sign In</h1>

            <!-- 🔥 ERROR MESSAGE -->
            {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
            {% endif %}

            <!-- 🔥 IMPORTANT -->
            <form method="POST" action="{{ url_for('login') }}">

                <!-- EMAIL -->
                <div class="form-group text-left">
                    <label>Email</label>
                    <input type="email"
                           class="form-control"
                           name="email"
                           placeholder="username@example.com"
                           required>
                </div>

                <!-- PASSWORD -->
                <div class="form-group text-left">
                    <label>Password</label>
                    <input type="password"
                           class="form-control"
                           name="password"
                           placeholder="Enter your password"
                           required>
                </div>

                <div class="text-md-right text-center mb-3">
                    <a href="#">Forgot password?</a>
                </div>

                <!-- SUBMIT -->
                <button type="submit"
                        class="btn btn-primary btn-lg btn-block">
                    Login
                </button>

                <p class="mt-3 mb-0">
                    Not a user?
                    <a href="/signup">Register now</a>
                </p>

            </form>

        </div>
    </div>
</div>

</body>
</html>
