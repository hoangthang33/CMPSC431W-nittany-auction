<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">

    <title>Sign Up</title>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Nittany Auction</a>

        <div class="ml-auto">
            <a href="/login" class="btn btn-primary mr-2">Login</a>
            <a href="/signup" class="btn btn-outline-secondary">Sign Up</a>
        </div>
    </div>
</nav>

<!-- MAIN -->
<div class="container mt-5 pb-5 d-flex align-items-center"
     style="max-width: 70%; min-height: 80vh;">

    <div class="row w-100">

        <!-- IMAGE -->
        <div class="col-md-6 d-none d-md-block">
            <img src="{{ url_for('static', filename='images/login.svg') }}"
                 class="img-fluid" alt="Sign-up illustration">
        </div>

        <!-- FORM -->
        <div class="col-md-6 text-md-left text-center">

            <h1 class="display-4 mb-4">Sign Up</h1>

            <!-- 🔥 ERROR MESSAGE -->
            {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
            {% endif %}

            <!-- 🔥 IMPORTANT -->
            <form method="POST" action="{{ url_for('signup') }}">

                <!-- EMAIL -->
                <div class="form-group text-left">
                    <label>Email</label>
                    <input type="email"
                           class="form-control"
                           name="email"
                           placeholder="username@example.com"
                           required>
                </div>

                <!-- PASSWORD -->
                <div class="form-group text-left">
                    <label>Password</label>
                    <input type="password"
                           class="form-control"
                           name="password"
                           placeholder="Choose a password"
                           required>
                </div>

                <!-- NAME -->
                <div class="form-group text-left">
                    <label>Full name or business name</label>
                    <input type="text"
                           class="form-control"
                           name="name"
                           required>
                </div>

                <!-- STREET -->
                <div class="form-group text-left">
                    <label>Street address</label>
                    <input type="text"
                           class="form-control"
                           name="street"
                           required>
                </div>

                <!-- CITY / STATE / ZIP -->
                <div class="form-row">

                    <div class="form-group col-md-6 text-left">
                        <label>City</label>
                        <input type="text"
                               class="form-control"
                               name="city"
                               required>
                    </div>

                    <div class="form-group col-md-3 text-left">
                        <label>State</label>
                        <input type="text"
                               class="form-control"
                               name="state"
                               required>
                    </div>

                    <div class="form-group col-md-3 text-left">
                        <label>ZIP code</label>
                        <input type="text"
                               class="form-control"
                               name="zipcode"
                               required>
                    </div>

                </div>

                <!-- PHONE -->
                <div class="form-group text-left">
                    <label>Phone number</label>
                    <input type="tel"
                           class="form-control"
                           name="phone"
                           required>
                </div>

                <!-- SUBMIT -->
                <button type="submit"
                        class="btn btn-primary btn-lg btn-block mt-2">
                    Create account
                </button>

                <p class="mt-3 mb-0">
                    Already have an account?
                    <a href="/login">Sign in</a>
                </p>

            </form>

        </div>
    </div>
</div>

</body>
</html>
